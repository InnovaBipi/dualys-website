# Route Registry - Dualys Website
# Single source of truth for all routes
# Updated per Briefing v2.0 (March 2026)

version: "2.0"
framework: "nextjs-app-router"
locales: ["ca", "es", "en", "fr"]
default_locale: "ca"

validation:
  statuses:
    published: "Page is live and accessible"
    draft: "Page exists but not ready for production"
    coming_soon: "Placeholder page with coming soon message"
    planned: "Not yet built"

  content_requirements:
    - has_hero
    - has_cta
    - has_breadcrumbs
    - has_structured_data
    - has_form
    - has_verticals
    - has_methodology
    - has_team_profiles
    - has_categories

# Hub & Spoke SEO clusters (new structure per briefing)
clusters:
  - name: "Services & Methodology"
    hub: "/servicios"
    spokes:
      - "/metodologia"

  - name: "Defense Verticals"
    hub: "/sectores"
    spokes: []

  - name: "Company"
    hub: "/nosotros"
    spokes: []

  - name: "Resources"
    hub: "/recursos"
    spokes:
      - "/recursos/[slug]"

routes:
  # === CORE PAGES ===
  - path: "/"
    status: published
    nav: [header]
    priority: 1.0
    changefreq: weekly
    seo:
      focus_keyword: "consultoria entrada sector defensa"
      secondary:
        - "dual use consulting españa"
        - "como entrar sector defensa"
        - "capacidades duales industria"
      intent: commercial
      cluster_role: pillar
    entry_points: []
    exit_points: ["/servicios", "/sectores", "/metodologia", "/nosotros", "/contact"]
    content_requirements: [has_hero, has_cta, has_structured_data, has_verticals]

  - path: "/servicios"
    status: draft
    nav: [header, footer]
    priority: 0.95
    changefreq: monthly
    seo:
      focus_keyword: "servicios consultoria defensa"
      secondary:
        - "programa entrada sector defensa"
        - "acompañamiento transicion dual use"
      intent: commercial
      cluster_role: hub
    entry_points: ["/"]
    exit_points: ["/metodologia", "/sectores", "/contact"]
    content_requirements: [has_hero, has_cta, has_breadcrumbs, has_structured_data]

  - path: "/sectores"
    status: draft
    nav: [header, footer]
    priority: 0.9
    changefreq: monthly
    seo:
      focus_keyword: "verticales defensa empresas"
      secondary:
        - "como homologar proveedor defensa"
        - "AQAP PECAL empresa manufacturera"
        - "sector defensa oportunidades"
      intent: informational
      cluster_role: hub
    entry_points: ["/", "/servicios"]
    exit_points: ["/contact", "/servicios"]
    content_requirements: [has_hero, has_breadcrumbs, has_structured_data, has_verticals]

  - path: "/metodologia"
    status: draft
    nav: [header]
    priority: 0.85
    changefreq: monthly
    seo:
      focus_keyword: "metodologia entrada defensa"
      secondary:
        - "programa FFD fit for defense"
        - "ruta dual use"
      intent: commercial
      cluster_role: spoke
    entry_points: ["/", "/servicios"]
    exit_points: ["/contact"]
    content_requirements: [has_hero, has_cta, has_breadcrumbs, has_structured_data, has_methodology]

  - path: "/nosotros"
    status: draft
    nav: [header, footer]
    priority: 0.8
    changefreq: monthly
    seo:
      focus_keyword: "dualys consultora defensa"
      secondary:
        - "equipo consultoria defensa españa"
        - "consultora dual use cataluña"
      intent: informational
      cluster_role: hub
    entry_points: ["/"]
    exit_points: ["/contact", "/servicios"]
    content_requirements: [has_hero, has_breadcrumbs, has_structured_data, has_team_profiles]

  - path: "/recursos"
    status: draft
    nav: [header, footer]
    priority: 0.8
    changefreq: weekly
    seo:
      focus_keyword: "blog defensa dual use"
      secondary:
        - "guia certificacion defensa"
        - "analisis mercado defensa europa"
      intent: informational
      cluster_role: hub
    entry_points: ["/"]
    exit_points: ["/contact"]
    content_requirements: [has_hero, has_categories]
    children:
      - path: "/recursos/[slug]"
        status: draft
        priority: 0.7
        changefreq: daily
        seo:
          focus_keyword: "dynamic"
          cluster_role: spoke

  - path: "/contact"
    status: published
    nav: [header, footer]
    priority: 0.9
    changefreq: monthly
    seo:
      focus_keyword: "contacto dualys"
      secondary:
        - "solicitar diagnostico defensa"
        - "consultoria entrada defensa contacto"
      intent: transactional
    content_requirements: [has_hero, has_form, has_structured_data]

  # === LEGAL PAGES ===
  - path: "/legal/privacy"
    status: published
    nav: [footer]
    priority: 0.3
    changefreq: yearly
    seo:
      focus_keyword: "dualys politica privacidad"
      intent: informational

  - path: "/legal/terms"
    status: published
    nav: [footer]
    priority: 0.3
    changefreq: yearly
    seo:
      focus_keyword: "dualys aviso legal"
      intent: informational

  - path: "/legal/cookies"
    status: published
    nav: [footer]
    priority: 0.3
    changefreq: yearly
    seo:
      focus_keyword: "dualys politica cookies"
      intent: informational

  # === FUTURE LANDING PAGES ===
  - path: "/pre-evaluacion"
    status: planned
    nav: []  # No nav for conversion
    priority: 0.6
    seo:
      focus_keyword: "preevaluacion entrada defensa"
      intent: transactional

  - path: "/para-industriales"
    status: planned
    nav: []
    priority: 0.6
    seo:
      focus_keyword: "empresas industriales sector defensa"
      intent: commercial

  - path: "/para-tecnologia"
    status: planned
    nav: []
    priority: 0.6
    seo:
      focus_keyword: "empresas tecnologia sector defensa"
      intent: commercial

  - path: "/para-primes"
    status: planned
    nav: []
    priority: 0.6
    seo:
      focus_keyword: "proveedores cadena suministro defensa"
      intent: commercial

# Redirects 301 (old → new)
redirects:
  - from: "/about"
    to: "/nosotros"
    status: 301
  - from: "/about/team"
    to: "/nosotros"
    status: 301
  - from: "/about/partners"
    to: "/nosotros"
    status: 301
  - from: "/capabilities"
    to: "/servicios"
    status: 301
  - from: "/capabilities/defense"
    to: "/servicios"
    status: 301
  - from: "/capabilities/cybersecurity"
    to: "/servicios"
    status: 301
  - from: "/capabilities/biosecurity"
    to: "/servicios"
    status: 301
  - from: "/capabilities/dual-use"
    to: "/servicios"
    status: 301
  - from: "/sectors"
    to: "/sectores"
    status: 301
  - from: "/news"
    to: "/recursos"
    status: 301

# Crosslinks
crosslinks:
  service_to_vertical:
    servicios: ["/sectores"]
    metodologia: ["/servicios", "/contact"]

  vertical_to_audience:
    terrestres: ["industriales"]
    naval: ["industriales"]
    aeronautica: ["industriales"]
    aeroespacial: ["tecnologia"]
    c4isr: ["tecnologia"]
    ciberdefensa: ["tecnologia"]
    uav_robotica: ["tecnologia"]
    simulacion: ["tecnologia"]
    auxiliar: ["industriales"]
