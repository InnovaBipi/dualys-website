# Critical User Journeys - Dualys Website
# Updated per Briefing v2.0 (March 2026)
# Used by: E2E tests, UX validation, navigation audits

version: "2.0"
last_updated: "2026-03-24"

journeys:
  primary_conversion:
    name: "Primary Conversion"
    description: "Homepage → Contact via CTA 'Solicita tu diagnóstico'"
    priority: critical
    expected_clicks: 1
    steps:
      - path: "/"
        action: "View homepage hero"
        expected_elements:
          - "H1: Tu empresa tiene lo que el sector defensa necesita"
          - "CTA: Solicita tu diagnóstico →"
          - "CTA secondary: Conoce nuestra metodología →"
          - "Context note: 800.000 M€"
      - path: "/contact"
        action: "Submit diagnostic request"
        expected_elements:
          - "Contact form with sector dropdown"
          - "RGPD checkbox"
          - "Address: Sant Cugat del Vallès"
    success_criteria:
      - "Form submission works"
      - "CTA visible above fold"
      - "1-click conversion from homepage"

  servicios_to_contact:
    name: "Services Exploration"
    description: "Homepage → Servicios → Contact"
    priority: critical
    expected_clicks: 2
    steps:
      - path: "/"
        action: "Click Servicios in nav"
      - path: "/servicios"
        action: "Learn about FFD program"
        expected_elements:
          - "Programa FFD branding"
          - "Enigmatic description (not detailed)"
          - "CTA to contact"
      - path: "/contact"
        action: "Submit inquiry"
    success_criteria:
      - "Program name FFD visible"
      - "No detailed methodology revealed"

  sectores_exploration:
    name: "Sectors Deep Dive"
    description: "Homepage → Sectores → Contact (for industrial/tech companies)"
    priority: high
    expected_clicks: 2
    steps:
      - path: "/"
        action: "Click audience card or Sectores in nav"
      - path: "/sectores"
        action: "Find matching defense vertical"
        expected_elements:
          - "9 defense verticals grid"
          - "'De dónde vienes, a dónde puedes ir' section"
          - "CTA to contact"
      - path: "/contact"
        action: "Submit with sector selected"

  metodologia_path:
    name: "Methodology Path"
    description: "Homepage → Metodología → Contact"
    priority: high
    expected_clicks: 2
    steps:
      - path: "/"
        action: "Click 'Conoce nuestra metodología' CTA"
      - path: "/metodologia"
        action: "View 3-phase methodology"
        expected_elements:
          - "3 phases: Diagnóstico, Posicionamiento, Activación"
          - "NDA/confidentiality mention"
          - "CTA to contact"
      - path: "/contact"
        action: "Request diagnostic"

  nosotros_trust:
    name: "Trust Building"
    description: "Homepage team section → Nosotros → Contact"
    priority: medium
    expected_clicks: 2
    steps:
      - path: "/"
        action: "Click 'Conoce al equipo' in team section"
      - path: "/nosotros"
        action: "Read company narrative and founder profiles"
        expected_elements:
          - "Company narrative"
          - "4 founder profiles (anonymous)"
          - "3-phase vision timeline"
      - path: "/contact"
        action: "Contact after trust"

  mobile_quick_contact:
    name: "Mobile Quick Contact"
    description: "Mobile user → CTA in header → Contact"
    priority: high
    device: mobile
    expected_clicks: 1
    steps:
      - path: "/"
        action: "Tap CTA button in header"
        expected_elements:
          - "CTA button visible in header"
          - "Touch target ≥ 48x48px"
      - path: "/contact"
        action: "Fill form"
        expected_elements:
          - "Sector dropdown works on mobile"
          - "Submit button visible"

  recursos_to_contact:
    name: "Content to Contact"
    description: "Recursos → Read article → Contact"
    priority: low
    expected_clicks: 3
    steps:
      - path: "/recursos"
        action: "Browse resources"
        expected_elements:
          - "Category filters"
          - "Article listings (or empty state)"
      - path: "/contact"
        action: "Inquire after reading"

# Performance thresholds
performance:
  lcp: "< 2.5s"
  inp: "< 200ms"
  cls: "< 0.1"
  journey_completion_rate: "75%"

# Navigation validation
navigation:
  header_items: 6
  header_cta: "Solicita tu diagnóstico"
  footer_links:
    - "/servicios"
    - "/sectores"
    - "/metodologia"
    - "/nosotros"
    - "/recursos"
    - "/contact"
  legal_links:
    - "/legal/privacy"
    - "/legal/terms"
    - "/legal/cookies"
