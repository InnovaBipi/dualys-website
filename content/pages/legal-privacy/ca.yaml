meta:
  title: Política de Privadesa | Dualys Strategy AIE
  description: Política de privadesa de Dualys Strategy AIE
title: Política de Privadesa
lastUpdated: 'Última actualització: Març 2026'
sections:
  - key: introduction
    title: Introducció
    content: >-
      Dualys Strategy AIE està compromesa amb la protecció de la seva privadesa.
      Aquesta Política de Privadesa explica com recopilem, usem i protegim la
      seva informació.
  - key: dataCollection
    title: Informació que Recopilem
    content: >-
      Recopilem informació que vostè proporciona voluntàriament: nom, empresa,
      correu electrònic, sector i descripció del seu repte.
  - key: dataUse
    title: Com Usem la Seva Informació
    content: >-
      Usem la informació per respondre consultes, proporcionar informació sobre
      serveis i millorar el lloc web.
  - key: dataSharing
    title: Compartició d'Informació
    content: >-
      No venem ni transferim la seva informació personal a tercers sense
      consentiment.
  - key: dataSecurity
    title: Seguretat de les Dades
    content: >-
      Implementem mesures tècniques i organitzatives per protegir la seva
      informació personal.
  - key: yourRights
    title: Els Seus Drets
    content: >-
      Segons el RGPD, té dret a accedir, rectificar, eliminar i portar les seves
      dades personals.
  - key: cookies
    title: Cookies
    content: El nostre lloc web utilitza cookies. Consulti la Política de Cookies.
  - key: changes
    title: Canvis
    content: >-
      Podem actualitzar aquesta política. Li notificarem publicant la nova
      versió aquí.
  - key: contact
    title: Contacte
    content: 'Preguntes sobre privadesa: info@dualys.eu.'
