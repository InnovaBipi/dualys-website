meta:
  title: Privacy Policy | Dualys
  description: Dualys privacy policy explaining how we collect, use, and protect your personal information.
title: Privacy Policy
lastUpdated: "Last updated: March 2026"
sections:
  - key: introduction
    title: Introduction
    content: Dualys AIE ("we", "our", or "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you visit our website.
  - key: dataCollection
    title: Information We Collect
    content: We collect information that you voluntarily provide when you contact us through our website, including your name, company, email address, sector, and a description of your challenge.
  - key: dataUse
    title: How We Use Your Information
    content: We use the information we collect to respond to your inquiries, provide you with information about our services, and improve our website and services.
  - key: dataSharing
    title: Information Sharing
    content: We do not sell, trade, or otherwise transfer your personal information to third parties without your consent, except as required by law or to service providers who assist us in operating our website.
  - key: dataSecurity
    title: Data Security
    content: We implement appropriate technical and organizational measures to protect your personal information against unauthorized access, alteration, disclosure, or destruction.
  - key: yourRights
    title: Your Rights
    content: Under GDPR, you have the right to access, rectify, erase, restrict processing, and port your personal data. You also have the right to object to processing and to withdraw consent at any time.
  - key: cookies
    title: Cookies
    content: Our website uses cookies to enhance your experience. Please refer to our Cookie Policy for more information.
  - key: changes
    title: Changes to This Policy
    content: We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page.
  - key: contact
    title: Contact Us
    content: If you have any questions about this Privacy Policy, please contact us at info@dualys.eu.
