meta:
  title: Dualys | Consultora Estratègica per al Sector Defensa
  description: >-
    Construïm capacitats duals per a la indústria. Accelerem l'entrada
    d'empreses industrials i tecnològiques al sector de la defensa europeu.
hero:
  title: >-
    La teva empresa pot competir en el sector de la defensa. Nosaltres t'ajudem
    a arribar-hi.
  cta: Sol·licita el teu diagnòstic
  ctaSecondary: Coneix la nostra metodologia
  contextNote: >-
    Europa ha compromès +800.000 M€ en defensa fins al 2030. El moment de
    posicionar-se és ara.
context:
  paragraph1: >-
    Dualys és l’ acceleradora estratègica entre la capacitat industrial i
    tecnològica de les empreses espanyoles i els mercats duals europeus.
    Impulsem la teva entrada al sector defensa amb criteri, metodologia i xarxa
    de contactes real.
  stats:
    - value: 800.000 M€
      label: Inversió europea en defensa fins al 2030
    - value: 44.000 M€
      label: Pla Industrial de Seguretat i Defensa d'Espanya
    - value: 2%
      label: Objectiu del PIB en inversió defensiva
audience:
  title: Per a qui és?
  cards:
    - key: industrial
      title: Industrials
      description: >-
        Fabricants de components, manufactura de precisió, automoció,
        aeronàutica, compostos, electrònica industrial.
      cta: Veure com treballem amb industrials
    - key: tech
      title: Tecnologia i software
      description: >-
        Empreses d'IA, robòtica, electrònica, ciberseguretat, comunicacions,
        simulació, bessons digitals, drons, IoT.
      cta: Veure com treballem amb empreses tech
    - key: empreses
      title: Grans empreses
      description: >-
        Empreses del sector defensa que necessiten ampliar la seva cadena de
        subministrament amb capacitat local qualificada.
      cta: Parlem
messages:
  title: Per què Dualys
  items:
    - title: El moment és ara
      text: |-
        El Pla Industrial de Seguretat i Defensa d'Espanya ja està actiu. 
        Les empreses que es posicionin ara tindran avantatge estructural.
    - title: Espanya i Catalunya estan preparades, però falta articulació
      text: |-
        Espanya disposa de tecnologia, indústria i talent de primer nivell. 
        Hi ha una desconnexió entre aquest potencial i les regles del joc.
    - title: Som una consultora que afegeix valor al teu negoci
      text: >-
        No fem informes que acaben en un calaix. 

        Accelerem entrades al mercat, reduïm el risc, obrim portes comercials
        reals.
    - title: La teva tecnologia civil ja és un avantatge competitiu en defensa
      text: Dualys t'ajuda a veure aquesta transferència i a fer-la operativa.
    - title: Reduïm el risc de la transició
      text: >-
        El sector defensa té normativa específica. 

        Dualys diagnostica primer, planifica després, connecta i executa amb
        criteri.
verticals:
  title: Verticals de defensa
  subtitle: >-
    Descobreix en quines àrees del sector defensa i seguretat pot posicionar-se
    la teva empresa
  cta: Descobreix en quin vertical encaixa la teva empresa
  items:
    - key: terrestrial
      title: Vehicles terrestres
      description: Vehicles, components mecànics, sistemes hidràulics
    - key: naval
      title: Sector naval
      description: Construcció naval, compostos, electrònica marina
    - key: aeronautics
      title: Aeronàutica militar
      description: Aeronàutica civil tier 1/2, mecanitzat, compostos
    - key: aerospace
      title: Aeroespacial i New Space
      description: Materials ultra-lleugers, electrònica d'alta precisió
    - key: c4isr
      title: Comunicacions (C4ISR)
      description: Telecomunicacions, programari, xarxes segures
    - key: cyber
      title: Ciberdefensa
      description: Seguretat, encriptació, anàlisi forense digital
    - key: uav
      title: UAV / UGV / USV
      description: Robòtica, visió artificial, IA aplicada, drons
    - key: armament
      title: Armament i munició
      description: Components de precisió, sistemes d'emmagatzematge, calibratge
    - key: simulation
      title: Simulació i gaming
      description: Programari de simulació, RV/RA, bessons digitals
    - key: auxiliary
      title: Sectors auxiliars
      description: Tèxtil tècnic, protecció, mecanitzat CNC
team: {}
