      cta: Parlem
messages:
  title: Per què Dualys
  items:
    - title: El moment és ara
      text: >-
        Europa ha compromès centenars de milers de milions en defensa i
        sobirania tecnològica. El Pla Industrial de Seguretat i Defensa
        d'Espanya ja està actiu. Les empreses que es posicionin ara tindran
        avantatge estructural.
    - title: Espanya i Catalunya estan preparades, però falta articulació
      text: >-
        Espanya disposa de tecnologia, indústria i talent de primer nivell. El
        problema no és el potencial: és la desconnexió entre aquest potencial i
        les regles del joc del sector.
    - title: Som una consultora que afegeix valor al teu negoci
      text: >-
        No fem informes que acaben en un calaix. Accelerem entrades al mercat,
        reduïm el risc, obrim portes comercials reals.
    - title: La teva tecnologia civil ja és un avantatge competitiu en defensa
      text: >-
        Si fabriques peces de precisió per a l'automòbil, pots fabricar-les per
        a plataformes terrestres o navals. Dualys t'ajuda a veure aquesta
        transferència i a fer-la operativa.
    - title: Reduïm el risc de la transició
      text: >-
        El sector defensa requereix de normativa específica (AQAP/PECAL, RID,
        EN9100, ISO 27001, ITAR, export controls). Dualys diagnostica primer,
        planifica després, acompanya i executa amb criteri.
