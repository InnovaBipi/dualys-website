meta:
  title: Dualys | Strategic Consultancy for the Defense Sector
  description: >-
    We build dual-use capabilities for industry. We facilitate the entry of
    industrial and technology companies into the European defense sector.
hero:
  title: Your company has what the defense sector needs. We help you get there.
  subtitle: >-
    DUALYS is the bridge between the industrial and technological capability of
    Spanish companies — with an initial emphasis on Catalan firms — and European
    dual-use markets. We accelerate your entry into the defense sector with
    expertise, methodology, and a real network of contacts.
  cta: Request your assessment
  ctaSecondary: Learn about our methodology
  contextNote: >-
    Europe has committed over 800,000 M€ to defense through 2030. The time to
    position yourself is now.
context:
  stats:
    - value: 800,000 M€
      label: European defense investment through 2030
    - value: 44,000 M€
      label: Spain's Industrial Security and Defense Plan
    - value: 2%
      label: GDP target for defense investment
audience:
  title: Who DUALYS is for
  cards:
    - key: industrial
      title: For manufacturers
      description: >-
        Component manufacturers, precision manufacturing, automotive,
        aeronautics, composites, industrial electronics.
      cta: See how we work with manufacturers
    - key: tech
      title: For technology and software
      description: >-
        AI, robotics, cybersecurity, communications, simulation, digital twins,
        drones, and IoT companies.
      cta: See how we work with tech companies
    - key: primes
