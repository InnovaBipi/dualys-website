messages:
  title: Why DUALYS
  items:
    - title: The time is now
      text: Europe has committed hundreds of billions to defense and technological sovereignty. Spain's Industrial Security and Defense Plan is already active. Companies that position themselves now will gain a structural advantage.
    - title: Spain and Catalonia are ready, but alignment is missing
      text: "Spain has world-class technology, industry, and talent. The problem is not potential: it is the disconnect between that potential and the rules of the game in the sector."
    - title: We are a consultancy that adds real value to your business
      text: We do not produce reports that end up in a drawer. We accelerate market entry, reduce risk, and open real commercial doors.
    - title: Your civil technology is already a competitive advantage in defense
      text: If you manufacture precision parts for the automotive industry, you can manufacture them for ground or naval platforms. DUALYS helps you see that transfer and make it operational.
    - title: We reduce the risk of transition
      text: The defense sector has specific regulations (AQAP/PECAL, RID, EN9100, ISO 27001, ITAR, export controls). DUALYS diagnoses first, plans second, and executes with expertise.
