meta:
  title: Dualys | Strategic Consultancy for the Defense Sector
  description: We build dual-use capabilities for industry. We facilitate the entry of industrial and technology companies into the European defense sector.
hero:
  title: Your company has what the defense sector needs. We help you get there.
  subtitle: DUALYS is the bridge between the industrial and technological capability of Spanish companies — with an initial emphasis on Catalan firms — and European dual-use markets. We accelerate your entry into the defense sector with expertise, methodology, and a real network of contacts.
  cta: Request your assessment
  ctaSecondary: Learn about our methodology
  contextNote: Europe has committed over 800,000 M€ to defense through 2030. The time to position yourself is now.
context:
  title: Why now
  paragraph1: Europe is undergoing a structural transformation in defense. Readiness Europe 2030 mobilizes up to 800,000 million euros in procurement and projects aimed at strengthening the European Defense Technological and Industrial Base (EDTIB). In Spain, the Industrial Security and Defense Plan is already active with a 44,000 million euro allocation for the coming years and the policy of reaching and maintaining 2% of GDP in defense investment.
  paragraph2: "Spain has a world-class industrial and technological ecosystem: leading companies in automotive, aeronautics, composites, electronics, artificial intelligence, robotics, and cybersecurity. Capabilities that the defense sector needs right now to build more resilient supply chains of European origin."
  paragraph3: The problem is not a lack of potential. Most SMEs and Catalan technology companies are unfamiliar with the entry mechanisms, the required certifications, or the defense market circuits. That is exactly what DUALYS solves.
  stats:
    - value: 800,000 M€
      label: European defense investment through 2030
    - value: 44,000 M€
      label: Spain's Industrial Security and Defense Plan
    - value: 2%
      label: GDP target for defense investment
