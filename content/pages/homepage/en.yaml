meta:
  title: Dualys | Strategic Consultancy for the Defense Sector
  description: >-
    We build dual-use capabilities for industry. We facilitate the entry of
    industrial and technology companies into the European defense sector.
hero:
  title: Your company has what the defense sector needs. We help you get there.
  cta: Request your assessment
  ctaSecondary: Learn about our methodology
  contextNote: >-
    Europe has committed over 800,000 M€ to defense through 2030. The time to
    position yourself is now.
context:
  paragraph1: >-
    DUALYS is the bridge between the industrial and technological capability of
    Spanish companies — with an initial emphasis on Catalan firms — and European
    dual-use markets. We accelerate your entry into the defense sector with
    expertise, methodology, and a real network of contacts.
  stats:
    - value: 800,000 M€
      label: European defense investment through 2030
    - value: 44,000 M€
      label: Spain's Industrial Security and Defense Plan
    - value: 2%
      label: GDP target for defense investment
audience:
  title: Who is it for?
  cards:
    - key: industrial
      title: Manufacturers
      description: >-
        Component manufacturers, precision manufacturing, automotive,
        aeronautics, composites, industrial electronics.
      cta: See how we work with manufacturers
    - key: tech
      title: Technology and software
      description: >-
        AI, robotics, cybersecurity, communications, simulation, digital twins,
        drones, and IoT companies.
      cta: See how we work with tech companies
    - key: primes
      title: Large companies
      description: >-
        Defense sector companies that need to expand their supply chain with
        qualified local capability.
      cta: Talk to us
messages:
  title: Why DUALYS
  items:
    - title: The time is now
      text: >-
        Spain's Industrial Security and Defense Plan is already active.
        Companies that position themselves now will gain a structural advantage.
    - title: Spain and Catalonia are ready, but alignment is missing
      text: >-
        Spain has world-class technology, industry, and talent. There is a
        disconnection between that potential and the rules of the game in the
        sector.
    - title: We are a consultancy that adds real value to your business
      text: >-
        We do not produce reports that end up in a drawer. We accelerate market
        entry, reduce risk, and open real commercial doors.
    - title: Your civil technology is already a competitive advantage in defense
      text: DUALYS helps you see that transfer and make it operational.
    - title: We reduce the risk of transition
      text: >-
        The defense sector has specific regulations. DUALYS diagnoses first,
        plans second, and executes with expertise.
verticals:
  title: Defense verticals
  subtitle: Discover which defense sector areas your company can position itself in
  cta: Discover which vertical fits your company
  items:
    - key: terrestrial
      title: Ground platforms
      description: Vehicles, mechanical components, hydraulic systems
    - key: naval
      title: Naval sector
      description: Shipbuilding, composites, marine electronics
    - key: aeronautics
      title: Military aeronautics
      description: Civil aeronautics tier 1/2, machining, composites
    - key: aerospace
      title: Aerospace and New Space
      description: Ultra-light materials, high-precision electronics
    - key: c4isr
      title: Communications (C4ISR)
      description: Telecommunications, software, secure networks
    - key: cyber
      title: Cyber defense
      description: Security, encryption, digital forensics
    - key: uav
      title: UAV / UGV / USV
      description: Robotics, machine vision, applied AI, drones
    - key: armament
      title: Armament and munitions
      description: Precision components, storage systems, calibration
    - key: simulation
