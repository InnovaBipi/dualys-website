messages:
  title: Pourquoi DUALYS
  items:
    - title: Le moment est maintenant
      text: L'Europe a engagé des centaines de milliards dans la défense et la souveraineté technologique. Le Plan Industriel de Sécurité et de Défense de l'Espagne est déjà actif. Les entreprises qui se positionnent maintenant bénéficieront d'un avantage structurel.
    - title: L'Espagne et la Catalogne sont prêtes, mais il manque l'articulation
      text: "L'Espagne dispose de technologie, d'industrie et de talents de premier plan. Le problème n'est pas le potentiel : c'est la déconnexion entre ce potentiel et les règles du jeu du secteur."
    - title: Nous sommes un cabinet de conseil qui crée de la valeur pour votre activité
      text: Nous ne rédigeons pas de rapports qui finissent dans un tiroir. Nous accélérons les entrées sur le marché, réduisons les risques et ouvrons de véritables portes commerciales.
    - title: Votre technologie civile est déjà un avantage compétitif dans la défense
      text: Si vous fabriquez des pièces de précision pour l'automobile, vous pouvez les fabriquer pour des plateformes terrestres ou navales. DUALYS vous aide à identifier ce transfert et à le rendre opérationnel.
    - title: Nous réduisons le risque de la transition
      text: Le secteur de la défense possède une réglementation spécifique (AQAP/PECAL, RID, EN9100, ISO 27001, ITAR, contrôles à l'exportation). DUALYS diagnostique d'abord, planifie ensuite et exécute avec rigueur.
