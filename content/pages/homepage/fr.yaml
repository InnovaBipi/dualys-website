meta:
  title: Dualys | Cabinet de Conseil Stratégique pour le Secteur de la Défense
  description: >-
    Nous développons des capacités duales pour l'industrie. Nous facilitons
    l'entrée des entreprises industrielles et technologiques dans le secteur de
    la défense européen.
hero:
  title: >-
    Ton entreprise a ce que le secteur de la défense recherche. Nous t'aidons à
    y accéder.
  cta: Demandez votre diagnostic
  ctaSecondary: Découvrez notre méthodologie
  contextNote: >-
    L'Europe a engagé plus de 800 000 M€ dans la défense d'ici 2030. Le moment
    de se positionner, c'est maintenant.
context:
  paragraph1: >-
    DUALYS est le pont entre la capacité industrielle et technologique des
    entreprises espagnoles, avec un accent initial sur les entreprises
    catalanes, et les marchés duaux européens. Nous accélérons ton entrée dans
    le secteur de la défense avec rigueur, méthodologie et un réseau de contacts
    concret.
  stats:
    - value: 800 000 M€
      label: Investissement européen dans la défense d'ici 2030
    - value: 44 000 M€
      label: Plan Industriel de Sécurité et de Défense de l'Espagne
    - value: 2%
      label: Objectif du PIB en investissement de défense
audience:
  title: À qui s'adresse DUALYS
  cards:
    - key: industrial
      title: Industriels
      description: >-
        Fabricants de composants, usinage de précision, automobile,
        aéronautique, composites, électronique industrielle.
      cta: Découvrir comment nous travaillons avec les industriels
    - key: tech
      title: Technologie et logiciel
      description: >-
        Entreprises d'IA, robotique, cybersécurité, communications, simulation,
        jumeaux numériques, drones, IoT.
      cta: Découvrir comment nous travaillons avec les entreprises tech
    - key: primes
      title: Grandes entreprises
      description: >-
        Entreprises du secteur de la défense qui ont besoin d'élargir leur
        chaîne d'approvisionnement avec des capacités locales qualifiées.
      cta: Parlons-en
messages:
  title: Pourquoi DUALYS
  items:
    - title: Le moment est maintenant
      text: >-
        Le Plan Industriel de Sécurité et de Défense de l'Espagne est déjà
        actif. Les entreprises qui se positionnent maintenant bénéficieront d'un
        avantage structurel.
    - title: L'Espagne et la Catalogne sont prêtes, mais il manque l'articulation
      text: >-
        L'Espagne dispose de technologie, d'industrie et de talents de premier
        niveau. Il existe une déconnexion entre ce potentiel et les règles du
        jeu.
    - title: >-
        Nous sommes un cabinet de conseil qui crée de la valeur pour votre
        activité
      text: >-
        Nous ne rédigeons pas de rapports qui finissent dans un tiroir. Nous
        accélérons les entrées sur le marché, réduisons les risques et ouvrons
        de véritables portes commerciales.
    - title: Votre technologie civile est déjà un avantage compétitif dans la défense
      text: DUALYS vous aide à voir ce transfert et à le rendre opérationnel.
    - title: Nous réduisons le risque de la transition
      text: |-
        Le secteur de la défense possède une réglementation spécifique.
        DUALYS diagnostique d'abord, planifie ensuite et exécute avec rigueur.
verticals:
  title: Verticales de défense
  subtitle: >-
    Découvrez dans quels domaines du secteur de la défense votre entreprise peut
    se positionner
  cta: Découvre dans quelle verticale ton entreprise s'intègre
  items:
    - key: terrestrial
      title: Plateformes terrestres
      description: Véhicules, composants mécaniques, systèmes hydrauliques
    - key: naval
      title: Secteur naval
      description: Construction navale, composites, électronique marine
    - key: aeronautics
      title: Aéronautique militaire
      description: Aéronautique civile tier 1/2, usinage, composites
    - key: aerospace
      title: Aérospatial et New Space
      description: Matériaux ultra-légers, électronique de haute précision
    - key: c4isr
      title: Communications (C4ISR)
      description: Télécommunications, logiciel, réseaux sécurisés
    - key: cyber
      title: Cyberdéfense
      description: Sécurité, chiffrement, analyse forensique numérique
    - key: uav
      title: UAV / UGV / USV
      description: Robotique, vision par ordinateur, IA appliquée, drones
    - key: armament
      title: Armement et munitions
      description: Composants de précision, systèmes de stockage, calibrage
    - key: simulation
      title: Simulation et gaming
      description: Logiciel de simulation, VR/AR, jumeaux numériques
    - key: auxiliary
      title: Secteurs auxiliaires
      description: Textile technique, protection, usinage CNC
