team:
  title: L'équipe
  text: "L'équipe fondatrice de DUALYS réunit des profils que l'on trouve rarement ensemble : une expérience de direction au sein d'institutions de sécurité et de défense, un parcours politique au plus haut niveau avec une connaissance approfondie de l'écosystème entrepreneurial espagnol et notamment catalan, une expertise technique et commerciale dans des projets industriels et de défense de portée internationale, et la capacité d'articuler des écosystèmes d'innovation et des chaînes de valeur complexes. Ensemble, nous couvrons les quatre axes nécessaires à une transition dual-use réussie : la connaissance du secteur, le développement commercial, l'accès institutionnel et la capacité d'exécution."
  cta: Découvrir l'équipe
cta:
  title: Développer des capacités duales pour l'industrie.
  subtitle: En 2 séances, nous vous fournissons un diagnostic clair, une carte des opportunités et un plan d'action.
  button: Demandez votre diagnostic
  buttonSecondary: Parlons-en
