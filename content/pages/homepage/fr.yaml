meta:
  title: Dualys | Cabinet de Conseil Stratégique pour le Secteur de la Défense
  description: Nous développons des capacités duales pour l'industrie. Nous facilitons l'entrée des entreprises industrielles et technologiques dans le secteur de la défense européen.
hero:
  title: Ton entreprise a ce que le secteur de la défense recherche. Nous t'aidons à y accéder.
  subtitle: DUALYS est le pont entre la capacité industrielle et technologique des entreprises espagnoles, avec un accent initial sur les entreprises catalanes, et les marchés duaux européens. Nous accélérons ton entrée dans le secteur de la défense avec rigueur, méthodologie et un réseau de contacts concret.
  cta: Demandez votre diagnostic
  ctaSecondary: Découvrez notre méthodologie
  contextNote: L'Europe a engagé plus de 800 000 M€ dans la défense d'ici 2030. Le moment de se positionner, c'est maintenant.
context:
  title: Pourquoi maintenant
  paragraph1: L'Europe connaît une transformation structurelle en matière de défense. Le Readiness Europe 2030 mobilise jusqu'à 800 000 millions d'euros en acquisitions et projets visant à renforcer la Base Technologique et Industrielle de Défense Européenne (BTIDE). En Espagne, le Plan Industriel de Sécurité et de Défense est déjà actif avec une dotation de 44 000 millions d'euros pour les prochaines années et l'objectif d'atteindre et de maintenir 2 % du PIB en investissement de défense.
  paragraph2: "L'Espagne dispose d'un écosystème industriel et technologique de premier plan : des entreprises leaders dans l'automobile, l'aéronautique, les composites, l'électronique, l'intelligence artificielle, la robotique et la cybersécurité. Des capacités dont le secteur de la défense a besoin, dès maintenant, pour construire des chaînes d'approvisionnement plus résilientes et d'origine européenne."
  paragraph3: Le problème n'est pas le manque de potentiel. La plupart des PME et entreprises technologiques catalanes ne connaissent pas les mécanismes d'entrée, les certifications nécessaires ni les circuits du marché de la défense. C'est exactement ce que DUALYS résout.
  stats:
    - value: 800 000 M€
      label: Investissement européen dans la défense d'ici 2030
    - value: 44 000 M€
      label: Plan Industriel de Sécurité et de Défense de l'Espagne
    - value: 2%
      label: Objectif du PIB en investissement de défense
