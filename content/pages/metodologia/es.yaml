meta:
  title: Metodología FFD | Programa de entrada al sector defensa | Dualys
  description: >-
    Conoce nuestro programa FFD: una metodología probada para acelerar la
    entrada de tu empresa en el sector defensa.
title: Metodología
subtitle: Fit For Defense (FFD) Dualys — Metodología Dualys
description: >-
  Un programa estructurado, probado y orientado a resultados. Bajo acuerdo de
  confidencialidad.
phases:
  - title: Diagnóstico
    description: >-
      Evaluación completa de capacidades, análisis de Gaps y encaje con el
      sector defensa.
  - title: Oportunidades
    description: >-
      Mapa de oportunidades de negocio, posicionamiento sectorial, dosier
      comercial, certificaciones necesarias y plan de acción.
  - title: Adaptación
    description: >-
      Adaptación de procesos, adaptación del posicionamiento comercial,
      adaptación a necesidades financieras, análisis de impacto financiero,
      adaptación y acompañamiento en certificaciones.
  - title: Conexión
    description: Entrada real al mercado con contactos, contratos y acompañamiento.
nda: >-
  Todos los procesos de diagnóstico y asesoramiento se realizan bajo acuerdo de
  confidencialidad.
cta: Solicita tu diagnóstico
