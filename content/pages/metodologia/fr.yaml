title: Méthodologie
subtitle: Fit For Defense (FFD) Dualys — Méthodologie Dualys
description: >-
  Un programme structuré, éprouvé et orienté résultats. Sous accord de
  confidentialité.
phases:
  - title: Diagnostic
    description: >-
      Évaluation complète des capacités, analyse des écarts et adéquation avec
      le secteur de la défense.
  - title: Opportunités
    description: >-
      Cartographie des opportunités, positionnement sectoriel, dossier
      commercial, certifications requises et plan d’action.
  - title: Adaptation
    description: >-
      Adaptation des processus, ajustement du positionnement commercial,
      alignement financier, analyse d’impact et accompagnement dans les
      processus de certification.
  - title: Connexion
    description: >-
      Accès au marché avec des contacts réels, des contrats et un accompagnement
      continu.
nda: >-
  Tous les processus de diagnostic et de conseil sont réalisés sous accord de
  confidentialité.
cta: Demandez votre diagnostic
