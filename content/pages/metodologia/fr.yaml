meta:
  title: Méthodologie FFD | Programme d'entrée dans le secteur de la défense | Dualys
  description: "Découvrez notre programme FFD : une méthodologie éprouvée pour accélérer l'entrée de votre entreprise dans le secteur de la défense."
title: Méthodologie
subtitle: Fit For Defense (FFD) Dualys — Méthodologie Dualys
description: Un programme structuré, éprouvé et orienté résultats. Sous accord de confidentialité.
phases:
  - title: Diagnostic
    description: >-
      Évaluation complète des capacités, analyse des écarts et adéquation avec
      le secteur de la défense.
  - title: Positionnement
    description: >-
      Carte des opportunités commerciales, positionnement sectoriel, dossier
      commercial, certifications nécessaires et plan d'action.
  - title: Adaptation
    description: >-
      Adaptation des processus, adaptation du positionnement commercial,
      adaptation aux besoins financiers, analyse d'impact financier, adaptation
      et accompagnement aux certifications.
  - title: Activation
    description: Entrée effective sur le marché avec des contacts, des contrats et un accompagnement.
nda: Tous les processus de diagnostic et de conseil sont réalisés sous accord de confidentialité.
cta: Demandez votre diagnostic
