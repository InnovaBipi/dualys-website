meta:
  title: Nosaltres | Equip i Visió | Dualys
  description: DUALYS neix de la convicció que Espanya té els ingredients per convertir-se en un referent europeu del dual use industrial i tecnològic.
title: Nosaltres
subtitle: Acceleradors estratègics per a la transició dual-use
narrative:
  paragraph1: "DUALYS neix d'una convicció: Espanya té els ingredients per convertir-se en un referent europeu del dual use industrial i tecnològic. Tecnologia de primer nivell, indústria robusta, ecosistema innovador i talent reconegut internacionalment. El que faltava era algú que articulés aquest potencial amb les regles del joc del mercat de defensa."
  paragraph2: "Fundada recentment, però amb una gran experiència adquirida durant anys, DUALYS és aquest actor. No som una consultora convencional ni un intermediari. Som acceleradors estratègics: ajudem empreses industrials, tecnològiques i de programari a comprendre el sector defensa, a posicionar-s'hi i a aconseguir els seus primers contractes reals. Amb metodologia provada, equip amb experiència de primer nivell i una xarxa de contactes construïda al llarg d'anys en institucions, empreses del sector i organismes europeus."
  vision: "La nostra visió a deu anys: que Espanya sigui un dels pols europeus de referència en innovació i producció dual-use, amb desenes d'empreses com a proveïdors estratègics dels principals programes de defensa europeus i com a hub d'acceleració dual use d'Europa."
founders:
  title: L'equip fundador
  profiles:
    - title: Visió institucional i seguretat
      text: Un dels fundadors aporta una trajectòria d'alta direcció en l'àmbit de la seguretat pública i les institucions catalanes. Ha dirigit organismes de seguretat al màxim nivell executiu i atesora un coneixement profund dels mecanismes de funcionament de les administracions i els processos de presa de decisió en entorns sensibles.
    - title: Estratègia i coneixement politicoinstitucional i ecosistema empresarial
      text: Un altre dels fundadors té la visió estratègica necessària per a aquest sector. Ha ocupat posicions de lideratge polític al més alt nivell a les institucions catalanes, amb responsabilitat directa sobre política industrial, empresa i treball. El seu accés a xarxes institucionals, empresarials i de finançament públic és un diferencial estratègic per a DUALYS.
    - title: Expertise tecnicoindustrial i operacions internacionals
      text: L'equip compta amb un perfil amb experiència directa en la construcció i escalat d'empreses a la intersecció de la indústria i la tecnologia d'última generació. La seva experiència en desenvolupament de negocis, execució de projectes, processos d'homologació, cadenes de subministrament complexes i visió empresarial és la columna vertebral de la metodologia d'acompanyament de DUALYS.
    - title: Comercialització en defensa i desenvolupament de negoci
      text: El quart perfil de l'equip fundador és el motor comercial de DUALYS. Amb experiència específica en desenvolupament de negoci orientat al sector defensa, coneix els canals, els temps, els interlocutors i les dinàmiques de venda en un mercat que funciona de manera radicalment diferent al B2B comercial estàndard.
vision:
  title: Visió de futur
  phases:
    - title: Fase 1 — El Despertar (2025-2026)
      text: Identificar i activar el potencial dual-use latent a l'ecosistema català. Ajudar les primeres 20-30 empreses a fer el pas.
    - title: Fase 2 — L'Acceleració (2027-2028)
      text: Construir un ecosistema dual-use interconnectat. Facilitar aliances entre startups catalanes i grans corporacions europees. Atraure inversió especialitzada.
    - title: Fase 3 — El Lideratge (2029-2030)
      text: Espanya com a pol europeu de referència en innovació i producció dual-use. Exportar el model a altres regions. Connectar l'ecosistema espanyol amb oportunitats globals.
cta: Sol·licita el teu diagnòstic
