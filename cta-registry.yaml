# CTA Registry - Dualys Website
# Updated per Briefing v2.0 (March 2026)
# CTAs from briefing section 9

version: "2.0"
last_updated: "2026-03-24"
locales: [ca, es, en, fr]

# === GLOBAL CTAs (consistent across all pages) ===
global_ctas:
  primary:
    label_key: "cta.primary"  # "Solicita tu diagnóstico →"
    destination: "/contact"
    variant: "accent"
  secondary:
    label_key: "cta.secondary"  # "Habla con nosotros →"
    destination: "/contact"
    variant: "outline"
  methodology:
    label_key: "cta.methodology"  # "Conoce nuestra metodología →"
    destination: "/metodologia"
    variant: "link"

# === HEADER NAVIGATION ===
header:
  file: "components/layout/Header.tsx"
  main_nav:
    - { path: "/", label_key: "nav.home" }
    - { path: "/servicios", label_key: "nav.servicios" }
    - { path: "/sectores", label_key: "nav.sectores" }
    - { path: "/metodologia", label_key: "nav.metodologia" }
    - { path: "/nosotros", label_key: "nav.nosotros" }
    - { path: "/recursos", label_key: "nav.recursos" }
  cta:
    path: "/contact"
    label_key: "cta.primary"
    variant: "accent"

# === FOOTER NAVIGATION ===
footer:
  file: "components/layout/Footer.tsx"
  sections:
    quick_links:
      - "/servicios"
      - "/sectores"
      - "/metodologia"
      - "/nosotros"
      - "/recursos"
      - "/contact"
    legal:
      - "/legal/privacy"
      - "/legal/terms"
      - "/legal/cookies"
  contact:
    email: "info@dualys.eu"
    address: "Camí Can Ametller 36 Planta Baixa, 08195 Sant Cugat del Vallès (Barcelona)"

# === PAGE CTA MATRIX ===
page_ctas:
  "/":
    primary:
      destination: "/contact"
      label_key: "cta.primary"  # "Solicita tu diagnóstico →"
    secondary:
      destination: "/metodologia"
      label_key: "cta.methodology"  # "Conoce nuestra metodología →"
    audience_cards:
      - { destination: "/sectores", label: "industriales" }
      - { destination: "/sectores", label: "tecnologia" }
      - { destination: "/contact", label: "primes" }
    verticals:
      destination: "/sectores"
      label_key: "homepage.verticals.cta"  # "Descubre en qué vertical encaja tu empresa →"
    final_cta:
      destination: "/contact"
      label_key: "cta.primary"

  "/servicios":
    primary:
      destination: "/contact"
      label_key: "cta.primary"
    secondary:
      destination: "/metodologia"
      label_key: "cta.methodology"

  "/sectores":
    primary:
      destination: "/contact"
      label_key: "cta.primary"

  "/metodologia":
    primary:
      destination: "/contact"
      label_key: "cta.primary"

  "/nosotros":
    primary:
      destination: "/contact"
      label_key: "cta.primary"

  "/recursos":
    primary:
      destination: "/contact"
      label_key: "cta.primary"

  "/contact":
    primary:
      type: "form"
      action: "submit"

# === JOURNEY STAGE MAPPING ===
journey_stages:
  awareness:
    - "/"
    - "/nosotros"
    - "/recursos"
    - "/recursos/*"

  consideration:
    - "/servicios"
    - "/sectores"
    - "/metodologia"

  decision:
    - "/contact"
    - "/pre-evaluacion"

# === CONVERSION FUNNEL (from briefing section 9.3) ===
conversion_funnel:
  step_1_captacion:
    channels: ["SEO orgánico", "LinkedIn", "eventos", "prensa"]
    landing: ["/", "/recursos/*"]
  step_2_cualificacion:
    action: "Formulario de contacto"
    fields: ["nombre", "empresa", "email", "sector", "reto"]
    auto_response: "Email de confirmación automático"
  step_3_contacto:
    sla: "48 horas"
    action: "Equipo DUALYS contacta para explicar metodología"

# === VALIDATION RULES ===
validation_rules:
  - rule: "all_destinations_exist"
    description: "Every CTA destination must resolve to an existing page"
    severity: error

  - rule: "primary_cta_present"
    description: "Every content page must have a primary CTA"
    severity: warning

  - rule: "contact_reachable"
    description: "Contact page must be reachable within 2 clicks from any page"
    severity: warning

  - rule: "cta_text_from_briefing"
    description: "Primary CTA must use exact text from briefing: 'Solicita tu diagnóstico →'"
    severity: error
